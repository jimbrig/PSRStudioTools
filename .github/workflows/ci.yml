name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build and test module
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build and tests
        run: ./build.ps1 -Task Test -Bootstrap
